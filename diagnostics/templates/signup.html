<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<div style="
    text-align:center;
    padding:12px;
    background:linear-gradient(90deg,#00a8ff,#2ecc71);
    color:white;
    font-size:20px;
    font-weight:bold;
">
🚗 Smart Vehicle Monitoring & Predictive Alert System
</div>
<nav style="
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#2f3640;
    color:white;
">
<div>🚗 Tracker</div>

<div>
<a href="{% url 'vehicle_list' %}" style="color:white;margin-right:10px;">Vehicles</a>
<a href="{% url 'logout' %}" style="color:white;">Logout</a>
</div>
</nav>
<style>
body{
background:linear-gradient(135deg,#1e272e,#485460);
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#2ecc71;
border:none;
color:white;
border-radius:5px;
font-size:16px;
}

.error{
color:red;
font-size:14px;
}

.success{
color:green;
font-size:14px;
}

a{
text-decoration:none;
color:#3498db;
}

</style>
</head>

<body>

<div class="box">

<h2>Create Account</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

<form method="post" autocomplete="off">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" autocomplete="off">

<input type="password" name="password" placeholder="Password" autocomplete="new-password">

<input type="password" name="confirm_password" placeholder="Confirm Password" autocomplete="new-password">

<button type="submit">Signup</button>

</form>

<p>Already have account? <a href="/login/">Login</a></p>

</div>

</body>
<footer style="
    text-align:center;
    padding:10px;
    background:#2f3640;
    color:white;
    margin-top:20px;
">
© 2026 Smart Vehicle Monitoring System | Developed by Pooja
</footer>
</html>
